name: Publish to NuGet

# Publishes the legacy v1 package `IDAnalyzer` to nuget.org when a version tag (v*) is pushed.
# Uses NuGet Trusted Publishing (OIDC) — no API key stored.
# Configure the policy on nuget.org (Trusted Publishing): Package Owner=idanalyzer,
# Repository Owner=idanalyzer, Repository=id-analyzer-dotnet, Workflow File=publish.yml,
# Environment=(blank). Set the Actions variable NUGET_USER to the nuget.org username
# that owns the policy.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write   # required for OIDC trusted publishing

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Pack
        run: dotnet pack IDAnalyzer/IDAnalyzer.csproj -c Release -o artifacts

      - name: NuGet trusted-publishing login (OIDC)
        uses: NuGet/login@v1
        id: login
        with:
          user: ${{ vars.NUGET_USER }}

      - name: Push to NuGet
        run: >
          dotnet nuget push "artifacts/*.nupkg"
          --api-key "${{ steps.login.outputs.NUGET_API_KEY }}"
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate
